<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人才Mapping报告库</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Helvetica Neue', Arial, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            color: #2c3e50;
        }

        .header {
            background: #ffffff;
            border-bottom: 1px solid #e1e8ed;
            padding: 28px 40px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: #1a4d2e;
            letter-spacing: -0.3px;
        }

        .logo-sub {
            color: #64748b;
            font-size: 14px;
            font-weight: 400;
            margin-left: 12px;
            padding-left: 12px;
            border-left: 1px solid #e1e8ed;
        }

        .back-link {
            color: #64748b;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.2s;
            font-size: 14px;
            font-weight: 500;
        }

        .back-link:hover {
            color: #1a4d2e;
        }

        .header-stats {
            display: flex;
            gap: 24px;
            align-items: center;
        }

        .stat {
            text-align: right;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #1a4d2e;
        }

        .stat-label {
            font-size: 12px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 2px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px;
        }

        .filters {
            background: #ffffff;
            border: 1px solid #e1e8ed;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 32px;
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 300px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 12px 16px 12px 44px;
            background: #f8fafc;
            border: 1px solid #e1e8ed;
            border-radius: 8px;
            color: #2c3e50;
            font-size: 14px;
            transition: all 0.2s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #2563eb;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.08);
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }

        .filter-group {
            display: flex;
            gap: 8px;
        }

        .filter-btn {
            padding: 10px 18px;
            background: #f8fafc;
            border: 1px solid #e1e8ed;
            border-radius: 6px;
            color: #64748b;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .filter-btn:hover {
            background: #f1f5f9;
            color: #2c3e50;
        }

        .filter-btn.active {
            background: #1a4d2e;
            border-color: #1a4d2e;
            color: #ffffff;
        }

        .company-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 24px;
        }

        .company-card {
            background: #ffffff;
            border: 1px solid #e1e8ed;
            border-radius: 12px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .company-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            border-color: #cbd5e1;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .company-name {
            font-size: 18px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 6px;
        }

        .business-type {
            display: inline-block;
            padding: 4px 10px;
            background: #e0f2fe;
            color: #0369a1;
            font-size: 11px;
            border-radius: 4px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .business-type.b2b {
            background: #dcfce7;
            color: #166534;
        }

        .business-type.finance {
            background: #fef3c7;
            color: #b45309;
        }

        .business-type.other {
            background: #f1f5f9;
            color: #475569;
        }

        .report-date {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 16px;
        }

        .card-content {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .info-row {
            display: flex;
            gap: 8px;
            font-size: 13px;
            line-height: 1.6;
        }

        .info-label {
            color: #64748b;
            flex-shrink: 0;
            font-weight: 500;
        }

        .info-value {
            color: #475569;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .card-footer {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid #f1f5f9;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .has-data {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .data-tag {
            font-size: 11px;
            padding: 3px 8px;
            background: #f8fafc;
            border-radius: 4px;
            color: #64748b;
            border: 1px solid #e1e8ed;
        }

        .view-btn {
            padding: 8px 16px;
            background: #1a4d2e;
            border: none;
            border-radius: 6px;
            color: #ffffff;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .view-btn:hover {
            background: #0f341f;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 40px;
            background: #ffffff;
            border: 1px solid #e1e8ed;
            border-radius: 12px;
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .empty-state h2 {
            color: #475569;
            margin-bottom: 8px;
            font-size: 18px;
        }

        .empty-state p {
            color: #94a3b8;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .header {
                padding: 20px;
            }

            .container {
                padding: 20px;
            }

            .company-grid {
                grid-template-columns: 1fr;
            }

            .filters {
                flex-direction: column;
            }

            .search-box {
                min-width: 100%;
            }

            .header-stats {
                width: 100%;
                justify-content: flex-end;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="header-left">
                <a href="nav.html" class="back-link">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                    返回首页
                </a>
                <div style="display:flex;align-items:center;">
                    <div class="logo">人才Mapping报告库</div>
                    <span class="logo-sub">2026年度</span>
                </div>
            </div>
            <div class="header-stats">
                <div class="stat">
                    <div class="stat-value" id="totalCount">0</div>
                    <div class="stat-label">公司</div>
                </div>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="filters">
            <div class="search-box">
                <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/>
                    <path d="M21 21l-4.35-4.35"/>
                </svg>
                <input type="text" id="searchInput" placeholder="搜索公司名称...">
            </div>
            <div class="filter-group">
                <button class="filter-btn active" data-filter="all" id="filter-all">全部</button>
                <button class="filter-btn" data-filter="大模型AI平台" id="filter-ai">大模型AI平台</button>
                <button class="filter-btn" data-filter="B2B机构业务" id="filter-b2b">B2B机构业务</button>
                <button class="filter-btn" data-filter="AI业务/金融信息" id="filter-finance">AI业务/金融信息</button>
            </div>
        </div>

        <div class="company-grid" id="companyGrid">
        </div>
    </div>

    <script>
        let allData = [];
        let currentFilter = 'all';
        let searchQuery = '';

        function updateFilterCounts() {
            const countAll = allData.length;
            const countAI = allData.filter(c => c.businessType === '大模型AI平台').length;
            const countB2B = allData.filter(c => c.businessType === 'B2B机构业务').length;
            const countFinance = allData.filter(c => c.businessType === 'AI业务/金融信息').length;

            document.getElementById('filter-all').textContent = `全部 (${countAll})`;
            document.getElementById('filter-ai').textContent = `大模型AI平台 (${countAI})`;
            document.getElementById('filter-b2b').textContent = `B2B机构业务 (${countB2B})`;
            document.getElementById('filter-finance').textContent = `AI业务/金融信息 (${countFinance})`;
        }

        async function loadData() {
            try {
                const response = await fetch('data/mapping-data.json');
                allData = await response.json();
                updateFilterCounts();
                renderCompanies();
                document.getElementById('totalCount').textContent = allData.length;
            } catch (error) {
                document.getElementById('companyGrid').innerHTML = `
                    <div class="empty-state">
                        <div class="icon">⚠️</div>
                        <h2>数据加载失败</h2>
                        <p>请确保 mapping-data.json 文件存在</p>
                    </div>
                `;
            }
        }

        function getBusinessTypeClass(type) {
            if (type === '大模型AI平台') return '';
            if (type === 'B2B机构业务') return 'b2b';
            if (type === 'AI业务/金融信息') return 'finance';
            return 'other';
        }

        function getDataTags(company) {
            const tags = [];
            if (company.organization) tags.push('组织架构');
            if (company.teamSize) tags.push('团队规模');
            if (company.talentBackground) tags.push('人才背景');
            if (company.compensation) tags.push('薪酬特点');
            if (company.talentFlow) tags.push('人才流动');
            if (company.strategy) tags.push('寻访策略');
            return tags;
        }

        function getFilteredCompanies() {
            return allData.filter(company => {
                const matchesFilter = currentFilter === 'all' || company.businessType === currentFilter;
                const matchesSearch = searchQuery === '' ||
                    company.name.toLowerCase().includes(searchQuery.toLowerCase());
                return matchesFilter && matchesSearch;
            });
        }

        function renderCompanies() {
            const grid = document.getElementById('companyGrid');
            const companies = getFilteredCompanies();

            if (companies.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">🔍</div>
                        <h2>没有找到匹配的公司</h2>
                        <p>尝试调整筛选条件或搜索关键词</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = companies.map((company, index) => {
                const tags = getDataTags(company);
                return `
                    <div class="company-card" onclick="viewDetail('${company.id}')">
                        <div class="card-header">
                            <div>
                                <div class="company-name">${escapeHtml(company.name)}</div>
                                <span class="business-type ${getBusinessTypeClass(company.businessType)}">${escapeHtml(company.businessType)}</span>
                            </div>
                        </div>
                        ${company.reportDate ? `<div class="report-date">📅 ${escapeHtml(company.reportDate)}</div>` : ''}
                        <div class="card-content">
                            ${company.teamSize ? `
                                <div class="info-row">
                                    <span class="info-label">团队规模:</span>
                                    <span class="info-value">${escapeHtml(company.teamSize.substring(0, 120))}...</span>
                                </div>
                            ` : ''}
                            ${company.talentBackground ? `
                                <div class="info-row">
                                    <span class="info-label">人才背景:</span>
                                    <span class="info-value">${escapeHtml(company.talentBackground.substring(0, 120))}...</span>
                                </div>
                            ` : ''}
                        </div>
                        <div class="card-footer">
                            <div class="has-data">
                                ${tags.map(tag => `<span class="data-tag">${tag}</span>`).join('')}
                            </div>
                            <button class="view-btn">查看详情</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function viewDetail(id) {
            window.location.href = `mapping-detail-pro.html?id=${encodeURIComponent(id)}`;
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('searchInput').addEventListener('input', (e) => {
                searchQuery = e.target.value;
                renderCompanies();
            });

            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentFilter = btn.dataset.filter;
                    renderCompanies();
                });
            });

            loadData();
        });
    </script>
</body>
</html>
