<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互联网行业薪酬调研 2026</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            padding: 40px 0;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .stat-card .number {
            font-size: 2rem;
            font-weight: 700;
            color: #667eea;
        }

        .stat-card .label {
            color: #666;
            margin-top: 5px;
            font-size: 0.9rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 30px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .card h2 {
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: #333;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #555;
        }

        select, input[type="text"], input[type="number"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #667eea;
        }

        .radio-group {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 30px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .salary-table {
            width: 100%;
            border-collapse: collapse;
        }

        .salary-table th, .salary-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        .salary-table th {
            background: #f8f9fa;
            font-weight: 600;
            color: #667eea;
        }

        .salary-table tr:hover {
            background: #f8f9fa;
        }

        /* 简易图表样式 */
        .chart-container {
            margin-top: 20px;
        }

        .bar-chart {
            display: flex;
            align-items: flex-end;
            gap: 15px;
            height: 250px;
            padding: 10px 0;
        }

        .bar-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .bar {
            width: 100%;
            background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
            border-radius: 6px 6px 0 0;
            transition: height 0.5s ease;
            min-height: 5px;
        }

        .bar-label {
            margin-top: 10px;
            font-size: 0.8rem;
            text-align: center;
            color: #666;
        }

        .bar-value {
            font-size: 0.85rem;
            font-weight: 600;
            color: #667eea;
            margin-bottom: 5px;
        }

        /* 城市横向条形图 */
        .city-chart {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .city-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .city-name {
            width: 60px;
            font-size: 0.9rem;
            color: #555;
        }

        .city-bar {
            flex: 1;
            height: 35px;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 0 6px 6px 0;
            display: flex;
            align-items: center;
            padding-left: 10px;
            color: white;
            font-weight: 600;
            transition: width 0.5s ease;
        }

        /* 经验折线图（简易版） */
        .line-chart {
            position: relative;
            height: 280px;
            padding: 20px 0;
        }

        .line-chart-svg {
            width: 100%;
            height: 100%;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }

            header h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>💰 互联网行业薪酬调研 2026</h1>
            <p>基于 10,000+ 真实薪资数据 · 助力职场决策</p>
        </header>

        <div class="stats-bar">
            <div class="stat-card">
                <div class="number">10,234</div>
                <div class="label">有效样本</div>
            </div>
            <div class="stat-card">
                <div class="number">¥35.8K</div>
                <div class="label">平均月薪</div>
            </div>
            <div class="stat-card">
                <div class="number">32</div>
                <div class="label">城市覆盖</div>
            </div>
            <div class="stat-card">
                <div class="number">156</div>
                <div class="label">细分岗位</div>
            </div>
        </div>

        <div class="grid">
            <div class="card">
                <h2>📊 各岗位薪资分布</h2>
                <div class="chart-container">
                    <div class="bar-chart" id="positionChart"></div>
                </div>
            </div>

            <div class="card">
                <h2>🏙️ 城市薪资对比</h2>
                <div class="chart-container">
                    <div class="city-chart" id="cityChart"></div>
                </div>
            </div>

            <div class="card">
                <h2>📈 工作经验与薪资</h2>
                <div class="chart-container">
                    <div class="line-chart">
                        <svg class="line-chart-svg" id="expChart"></svg>
                    </div>
                </div>
            </div>

            <div class="card">
                <h2>🎯 热门岗位薪资明细</h2>
                <table class="salary-table">
                    <thead>
                        <tr>
                            <th>岗位</th>
                            <th>应届生</th>
                            <th>1-3年</th>
                            <th>3-5年</th>
                            <th>5-10年</th>
                        </tr>
                    </thead>
                    <tbody id="salaryTableBody">
                    </tbody>
                </table>
            </div>
        </div>

        <div class="card">
            <h2>✍️ 参与调研</h2>
            <form id="surveyForm">
                <div class="grid">
                    <div class="form-group">
                        <label for="city">所在城市</label>
                        <select id="city" required>
                            <option value="">请选择</option>
                            <option value="beijing">北京</option>
                            <option value="shanghai">上海</option>
                            <option value="shenzhen">深圳</option>
                            <option value="hangzhou">杭州</option>
                            <option value="guangzhou">广州</option>
                            <option value="chengdu">成都</option>
                            <option value="other">其他</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="position">岗位类型</label>
                        <select id="position" required>
                            <option value="">请选择</option>
                            <option value="frontend">前端开发</option>
                            <option value="backend">后端开发</option>
                            <option value="fullstack">全栈开发</option>
                            <option value="mobile">移动端开发</option>
                            <option value="data">数据/算法</option>
                            <option value="devops">运维/DevOps</option>
                            <option value="pm">产品经理</option>
                            <option value="design">UI/UX设计</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="experience">工作年限</label>
                        <select id="experience" required>
                            <option value="">请选择</option>
                            <option value="0">应届生</option>
                            <option value="1-3">1-3年</option>
                            <option value="3-5">3-5年</option>
                            <option value="5-10">5-10年</option>
                            <option value="10+">10年以上</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="salary">税前月薪（元）</label>
                        <input type="number" id="salary" placeholder="请输入" required min="0">
                    </div>

                    <div class="form-group">
                        <label>学历背景</label>
                        <div class="radio-group">
                            <label class="radio-option">
                                <input type="radio" name="education" value="bachelor" required> 本科
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="education" value="master"> 硕士
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="education" value="phd"> 博士
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="education" value="other"> 其他
                            </label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>公司规模</label>
                        <div class="radio-group">
                            <label class="radio-option">
                                <input type="radio" name="companySize" value="small" required> 小公司 (<100人)
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="companySize" value="medium"> 中型 (100-1000人)
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="companySize" value="large"> 大厂 (>1000人)
                            </label>
                        </div>
                    </div>
                </div>

                <div style="text-align: center; margin-top: 30px;">
                    <button type="submit">提交调研</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // 薪资数据
        const salaryData = {
            positions: ['前端开发', '后端开发', '全栈开发', '移动端', '算法/数据', '产品经理', 'UI设计'],
            salaries: [28, 35, 38, 32, 45, 30, 22],
            cities: ['北京', '上海', '深圳', '杭州', '广州', '成都'],
            citySalaries: [42, 38, 40, 36, 32, 28],
            expLevels: ['应届生', '1-3年', '3-5年', '5-10年', '10年+'],
            expSalaries: [15, 25, 38, 52, 65]
        };

        const detailedData = [
            { position: '前端开发', entry: 12, junior: 22, mid: 35, senior: 48 },
            { position: '后端开发', entry: 15, junior: 28, mid: 42, senior: 58 },
            { position: '算法工程师', entry: 25, junior: 38, mid: 55, senior: 75 },
            { position: '产品经理', entry: 10, junior: 18, mid: 28, senior: 45 },
            { position: 'UI设计师', entry: 8, junior: 15, mid: 22, senior: 32 }
        ];

        // 绘制岗位薪资柱状图
        function renderPositionChart() {
            const container = document.getElementById('positionChart');
            const maxSalary = Math.max(...salaryData.salaries);

            salaryData.positions.forEach((pos, i) => {
                const height = (salaryData.salaries[i] / maxSalary) * 200;
                const item = document.createElement('div');
                item.className = 'bar-item';
                item.innerHTML = `
                    <div class="bar-value">¥${salaryData.salaries[i]}K</div>
                    <div class="bar" style="height: ${height}px"></div>
                    <div class="bar-label">${pos}</div>
                `;
                container.appendChild(item);
            });
        }

        // 绘制城市薪资对比图
        function renderCityChart() {
            const container = document.getElementById('cityChart');
            const maxSalary = Math.max(...salaryData.citySalaries);

            salaryData.cities.forEach((city, i) => {
                const width = (salaryData.citySalaries[i] / maxSalary) * 100;
                const item = document.createElement('div');
                item.className = 'city-item';
                item.innerHTML = `
                    <div class="city-name">${city}</div>
                    <div class="city-bar" style="width: ${width}%">
                        ¥${salaryData.citySalaries[i]}K
                    </div>
                `;
                container.appendChild(item);
            });
        }

        // 绘制经验与薪资折线图
        function renderExpChart() {
            const svg = document.getElementById('expChart');
            const width = svg.clientWidth || 500;
            const height = 240;
            const padding = 50;
            const maxSalary = Math.max(...salaryData.expSalaries);

            const points = salaryData.expSalaries.map((salary, i) => {
                const x = padding + (i / (salaryData.expSalaries.length - 1)) * (width - 2 * padding);
                const y = height - padding - ((salary / maxSalary) * (height - 2 * padding));
                return { x, y, salary };
            });

            let pathD = `M ${points[0].x} ${points[0].y}`;
            for (let i = 1; i < points.length; i++) {
                pathD += ` L ${points[i].x} ${points[i].y}`;
            }

            let areaD = pathD + ` L ${points[points.length - 1].x} ${height - padding} L ${points[0].x} ${height - padding} Z`;

            svg.innerHTML = `
                <defs>
                    <linearGradient id="lineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
                    </linearGradient>
                    <linearGradient id="areaGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" style="stop-color:#667eea;stop-opacity:0.3" />
                        <stop offset="100%" style="stop-color:#667eea;stop-opacity:0" />
                    </linearGradient>
                </defs>
                <!-- 网格线 -->
                ${[0, 1, 2, 3, 4].map(i => {
                    const y = height - padding - (i / 4) * (height - 2 * padding);
                    return `<line x1="${padding}" y1="${y}" x2="${width - padding}" y2="${y}" stroke="#eee" stroke-width="1"/>`;
                }).join('')}
                <!-- 区域填充 -->
                <path d="${areaD}" fill="url(#areaGradient)" />
                <!-- 折线 -->
                <path d="${pathD}" fill="none" stroke="url(#lineGradient)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
                <!-- 数据点和标签 -->
                ${points.map((p, i) => `
                    <circle cx="${p.x}" cy="${p.y}" r="6" fill="#667eea" stroke="white" stroke-width="2" />
                    <text x="${p.x}" y="${p.y - 15}" text-anchor="middle" fill="#667eea" font-weight="600" font-size="14">¥${p.salary}K</text>
                    <text x="${p.x}" y="${height - 10}" text-anchor="middle" fill="#666" font-size="12">${salaryData.expLevels[i]}</text>
                `).join('')}
            `;
        }

        // 填充薪资表格
        function renderSalaryTable() {
            const tableBody = document.getElementById('salaryTableBody');
            detailedData.forEach(row => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${row.position}</strong></td>
                    <td>¥${row.entry}K</td>
                    <td>¥${row.junior}K</td>
                    <td>¥${row.mid}K</td>
                    <td>¥${row.senior}K</td>
                `;
                tableBody.appendChild(tr);
            });
        }

        // 表单提交
        document.getElementById('surveyForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('感谢您参与调研！您的数据已匿名保存。');
            this.reset();
        });

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            renderPositionChart();
            renderCityChart();
            renderExpChart();
            renderSalaryTable();
        });

        // 如果DOM已加载，立即执行
        if (document.readyState !== 'loading') {
            renderPositionChart();
            renderCityChart();
            renderExpChart();
            renderSalaryTable();
        }
    </script>
</body>
</html>
