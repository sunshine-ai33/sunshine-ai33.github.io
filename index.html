<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的静态页面导航</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeInDown 0.8s ease-out;
        }

        .header h1 {
            color: white;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 0 2px 20px rgba(0,0,0,0.2);
        }

        .header p {
            color: rgba(255,255,255,0.8);
            font-size: 1.1rem;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            animation: fadeInUp 0.8s ease-out;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 30px 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2);
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
        }

        .card-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            font-size: 28px;
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #1a202c;
            margin-bottom: 8px;
            word-break: break-all;
        }

        .card-desc {
            color: #718096;
            font-size: 0.95rem;
            margin-bottom: 20px;
        }

        .card-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #667eea;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
        }

        .card-link:hover {
            color: #764ba2;
            gap: 12px;
        }

        .footer {
            text-align: center;
            margin-top: 60px;
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
        }

        .empty-state {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 60px 40px;
            text-align: center;
            color: white;
        }

        .empty-state .icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 640px) {
            .header h1 {
                font-size: 1.8rem;
            }
            .card-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>📚 我的静态页面</h1>
            <p>快速访问所有发布的页面</p>
        </header>

        <div class="card-grid" id="pageList">
            <div class="empty-state" style="grid-column: 1 / -1;">
                <div class="icon">📭</div>
                <h2>还没有发布的页面</h2>
                <p>发布一些页面后再来查看吧！</p>
            </div>
        </div>

        <footer class="footer">
            <p>Powered by sunshine-ai33.github.io</p>
        </footer>
    </div>

    <script>
        // 页面列表数据（由 Claude 自动生成）
        const pages = [];

        // 生成页面卡片
        function generateCards() {
            const container = document.getElementById('pageList');

            if (pages.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <div class="icon">📭</div>
                        <h2>还没有发布的页面</h2>
                        <p>发布一些页面后再来查看吧！</p>
                    </div>
                `;
                return;
            }

            // 对页面按文件名排序
            pages.sort((a, b) => a.filename.localeCompare(b.filename));

            container.innerHTML = pages.map((page, index) => `
                <div class="card" style="animation-delay: ${index * 0.1}s">
                    <div class="card-icon">
                        ${getIconForPage(page.filename)}
                    </div>
                    <h3 class="card-title">${page.title || page.filename}</h3>
                    <p class="card-desc">${page.filename}</p>
                    <a href="${page.filename}" class="card-link">
                        访问页面
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                            <polyline points="12 5 19 12 12 19"></polyline>
                        </svg>
                    </a>
                </div>
            `).join('');
        }

        // 根据文件名获取图标
        function getIconForPage(filename) {
            const lower = filename.toLowerCase();
            if (lower.includes('train') || lower.includes('培训')) return '🎓';
            if (lower.includes('report') || lower.includes('报告')) return '📊';
            if (lower.includes('card') || lower.includes('卡片')) return '🃏';
            if (lower.includes('salary') || lower.includes('薪资')) return '💰';
            if (lower.includes('slide') || lower.includes('幻灯')) return '📽️';
            if (lower.includes('image') || lower.includes('图片')) return '🖼️';
            return '📄';
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', generateCards);
    </script>
</body>
</html>
